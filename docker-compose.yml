services:
  mysql:
    image: mysql:8.0
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_NAME:-bakery_inventory}
      MYSQL_USER: ${DB_USER:-bakery}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bakery}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"

  web:
    build: .
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis

  worker:
    build: .
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    depends_on:
      - mysql
      - redis

  beat:
    build: .
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
