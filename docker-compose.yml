services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bakery_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    depends_on:
      - postgres
      - redis

  beat:
    build: .
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
